name: jarvis_ai
description: Jarvis AI — Your personal Iron Man assistant.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # HTTP
  dio: ^5.7.0

  # Voice
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0

  # Background service
  flutter_background_service: ^5.0.5
  flutter_background_service_android: ^6.2.2

  # DI
  get_it: ^8.0.2

  # Persistence
  shared_preferences: ^2.3.3

  # UI & Animation
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  permission_handler: ^11.3.1
  google_fonts: ^6.2.1

  # Media
  path_provider: ^2.1.5
  video_player: ^2.9.2
  chewie: ^1.8.5
  cached_network_image: ^3.4.1
  gal: ^2.3.0
  url_launcher: ^6.3.1

  # Utils
  uuid: ^4.5.1
  logger: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/
